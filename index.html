<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marble Lotus — Aria Post-Purchase Bot</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
  .app-wrap { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 12px; }
  .header { background: #fff; border-radius: 12px; padding: 16px 20px; border: 1px solid #e5e5e5; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .brand { font-size: 15px; font-weight: 600; color: #1a1a1a; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; display: inline-block; margin-right: 6px; }
  .status { font-size: 12px; color: #666; }
  .sub { font-size: 12px; color: #999; }
  .order-tag { background: #f5f5f5; border-radius: 8px; padding: 8px 12px; font-size: 12px; color: #555; border: 1px solid #e5e5e5; }
  .order-tag span { font-weight: 600; color: #1a1a1a; }
  .chat-box { background: #fff; border-radius: 12px; border: 1px solid #e5e5e5; height: 460px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .msg-row { display: flex; flex-direction: column; }
  .msg-row.user { align-items: flex-end; }
  .msg-row.agent { align-items: flex-start; }
  .msg-label { font-size: 11px; color: #999; margin-bottom: 3px; padding: 0 4px; }
  .bubble { max-width: 82%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; }
  .agent .bubble { background: #f0f0f0; color: #1a1a1a; border-bottom-left-radius: 4px; }
  .user .bubble { background: #1a1a1a; color: #fff; border-bottom-right-radius: 4px; }
  .typing { display: flex; align-items: center; gap: 4px; padding: 10px 14px; background: #f0f0f0; border-radius: 16px; border-bottom-left-radius: 4px; width: fit-content; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #999; animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
  .input-row { display: flex; gap: 8px; }
  .input-row input { flex: 1; padding: 12px 16px; border: 1px solid #e5e5e5; border-radius: 24px; font-size: 14px; outline: none; background: #fff; }
  .input-row input:focus { border-color: #999; }
  .input-row button { padding: 12px 20px; background: #1a1a1a; color: #fff; border: none; border-radius: 24px; font-size: 14px; cursor: pointer; white-space: nowrap; }
  .input-row button:hover { background: #333; }
  .input-row button:disabled { background: #ccc; cursor: not-allowed; }
  .btn-row { display: flex; gap: 8px; }
  .end-btn { flex: 1; padding: 12px; background: #fff; color: #666; border: 1px solid #e5e5e5; border-radius: 10px; font-size: 13px; cursor: pointer; }
  .end-btn:hover { background: #f9f9f9; color: #1a1a1a; }
  .new-btn { padding: 12px 16px; background: #fff; color: #666; border: 1px solid #e5e5e5; border-radius: 10px; font-size: 13px; cursor: pointer; white-space: nowrap; }
  .new-btn:hover { background: #f9f9f9; color: #1a1a1a; }
  .summary { background: #fff; border-radius: 12px; border: 1px solid #e5e5e5; padding: 20px; display: none; }
  .summary.visible { display: block; }
  .summary h2 { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #f0f0f0; }
  .summary-block { background: #f9f9f9; border-radius: 8px; padding: 14px; font-size: 13px; color: #333; line-height: 1.8; white-space: pre-wrap; font-family: monospace; }
  .summary-label { font-size: 11px; color: #999; margin-bottom: 8px; }
  .error-banner { background: #fff3f3; border: 1px solid #fca5a5; border-radius: 10px; padding: 12px 16px; font-size: 13px; color: #dc2626; display: none; }
  .error-banner.visible { display: block; }
</style>
</head>
<body>
<div class="app-wrap">
  <div class="header">
    <div class="header-top">
      <span class="brand">Marble Lotus</span>
      <span class="status"><span class="status-dot"></span>Aria is active</span>
    </div>
    <div class="sub">Post-Purchase Feedback Bot — Test Environment</div>
  </div>

  <div class="order-tag" id="order-tag">Loading order...</div>

  <div class="error-banner" id="error-banner"></div>
  <div class="chat-box" id="chat-box"></div>

  <div class="input-row">
    <input type="text" id="user-input" placeholder="Type as the customer..." />
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>

  <div class="btn-row">
    <button class="end-btn" onclick="endConversation()">End Conversation + Generate Summary</button>
    <button class="new-btn" onclick="newChat()">New Chat</button>
  </div>

  <div class="summary" id="summary">
    <h2>Conversation Summary Report</h2>
    <div class="summary-label">Auto-generated — mirrors what Airtable would capture in production</div>
    <div class="summary-block" id="summary-content">Generating...</div>
  </div>
</div>

<script>
const PROXY_URL = "https://marble-lotus-proxy.harshamgowda11.workers.dev";
const MODEL = "claude-sonnet-4-20250514";

const CUSTOMERS = [
  { name: "Sarah",    last: "Johnson",   phone: "+1 415 555 0192", ref: "ML-00142" },
  { name: "Priya",    last: "Nair",      phone: "+1 312 555 0847", ref: "ML-00158" },
  { name: "Emily",    last: "Carter",    phone: "+1 646 555 0334", ref: "ML-00173" },
  { name: "Meera",    last: "Sharma",    phone: "+1 713 555 0621", ref: "ML-00189" },
  { name: "Jessica",  last: "Williams",  phone: "+1 206 555 0459", ref: "ML-00204" },
  { name: "Ananya",   last: "Patel",     phone: "+1 510 555 0783", ref: "ML-00217" },
  { name: "Lauren",   last: "Mitchell",  phone: "+1 214 555 0916", ref: "ML-00231" },
  { name: "Kavya",    last: "Reddy",     phone: "+1 408 555 0372", ref: "ML-00245" }
];

const ORDERS = [
  { product: "Bagiya Peacock Chinoiserie Wallpaper",   upsell: "Gardens of Jaipur Wallpaper" },
  { product: "Gardens of Jaipur Peel and Stick Wallpaper", upsell: "Kusum Jharokha Wallpaper" },
  { product: "Agave Americana Gold Chandelier",        upsell: "Bective Table Lamp" },
  { product: "Lotus Jaal Original Painting",           upsell: "Blue Peacock Pichwai Painting" },
  { product: "Jodhpur Terracotta Vase Set",            upsell: "Dhokra Tribal Sculpture" },
  { product: "Suzani Embroidered Textile",             upsell: "Madhubani Wall Art Print" },
  { product: "Bective Brass Table Lamp",               upsell: "Agave Americana Gold Chandelier" },
  { product: "Kusum Jharokha Wallpaper",               upsell: "Bagiya Peacock Chinoiserie Wallpaper" }
];

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

let customer, order;
let conversationHistory = [];
let isTyping = false;

function buildSystemPrompt(customerName, productName, upsellProduct) {
  return `You are Aria, an AI assistant for Marble Lotus — a South Asian-inspired home decor brand. You communicate via SMS.

## Tone
Professional, warm, and concise. Never overly casual. Never robotic. Think of a helpful brand representative who respects the customer's time. Get to the point. Say only what is needed.

## Important context
You already have the customer's name, email, phone number, and order details from the order system. Never ask for any of these under any circumstance.

## Customer and order for this conversation
Customer first name: ${customerName}
Product ordered: ${productName}
Upsell suggestion: ${upsellProduct}

## Opening — send this exactly once at the start
"Hi! This is Aria, an AI assistant from Marble Lotus. I'm reaching out regarding your recent order of ${productName}. Am I speaking with ${customerName}?"

Wait for confirmation.
If they confirm → "Wonderful! Is this a good time to chat for a couple of minutes?"
If wrong person → "I apologise for the confusion. Have a great day." End.
If bad time → "Understood. We will follow up with you shortly. Have a great day." End.
If yes → continue.

## Step 1 — feedback
Ask ONE question only:
"How has your experience been with the ${productName}? Did everything arrive as expected?"

Listen to the response.

If positive → acknowledge briefly and continue naturally.
If complaint or issue → respond with:
"I understand. This is outside what I can resolve directly — our team will look into this and get back to you. Is there a time that works best for you to be contacted?"
  If they give a time → "Noted. Our team will reach out then." Close politely.
  If no specific time → "Understood. We will follow up via email with a resolution." Close politely.
Never attempt upsell after any complaint.

## Step 2 — open conversation
After positive feedback, let the customer lead. Answer any questions using the knowledge base. Keep replies short and accurate.

If a question is outside your scope → do NOT ask for contact details. Say:
"That is not something I can advise on directly. Our team will follow up with you on that."
Then ask: "Is there a preferred time for our team to reach you?"
  If they give a time → "Noted. You will hear from us then."
  If no specific time → "Understood. We will reach out via email."

## Step 3 — review request, only if customer is satisfied and no complaints
"We would love to hear your feedback. Would you be open to leaving a quick review for the ${productName}?"

If yes →
"On a scale of 1 to 5, how would you rate it?"
Wait for their number.
"Thank you. Could you share one sentence about your experience?"
Wait for their sentence.
"Appreciate that. As a thank you, you will receive a discount code for your next order."

If no → "No problem at all. Thank you for your time." Move to close.

## Step 4 — upsell, only if rating is 4 or 5 and customer is happy
ONE mention only:
"One thing worth knowing — customers who loved the ${productName} have also really liked the ${upsellProduct}. It pairs well with the same aesthetic. Our team can send you more details if you are interested."

If interested → "Our team will follow up with the details shortly."
If not interested → drop it immediately. Do not raise again.

## Step 5 — referral, only after positive upsell response
"We also have a referral programme — if you refer a friend, they receive a discount on their first order and you earn store credit. Our team will include the details when they follow up."

## Step 6 — close
"Thank you for your time, ${customerName}. If you need anything, you can always reach us at team@marble-lotus.com or visit marble-lotus.com. Have a great day."

## Rules
- Always identify as AI at the start. Never claim to be human.
- Never ask for email, phone, or any contact detail — it is already in the system.
- Never quote specific prices — direct to marble-lotus.com.
- Ask only one question at a time.
- Keep replies to 1 to 3 sentences maximum.
- Never push upsell or referral more than once.
- If the customer gives short replies or seems rushed — wrap up quickly and close.
- Professional tone throughout. Slightly warm but never over-familiar.

## KNOWLEDGE BASE

### Business Overview
Marble Lotus is a South Asian-inspired home decor brand founded in 2022 by Soni Mehra, a former Senior Product Manager at Uber, Lime, and LinkedIn. The brand bridges South Asian craft traditions with contemporary design. Website: marble-lotus.com. Interior design studio: marblelotusinteriors.com.

### Contact
General support: team@marble-lotus.com. Trade enquiries: trade@marble-lotus.com. Instagram: @marble_lotus. TikTok: @marble_lotus.

### Products
WALLPAPER: Peel and stick and custom murals. Removable and renter-friendly. Buy 5 samples, get free US shipping. Hero products: Gardens of Jaipur (tropical Rajasthani, best-seller), Bagiya Peacock Chinoiserie (customisable), Kusum Jharokha (Indian floral).
ARTWORK PRINTS: Giclee prints, easy to hang. Collections: India on the Go by Archana Pereira, Scenes of South Asia, Jaipur City Palace Doors.
FINE ART: Madhubani paintings, Pichwai paintings. Lotus Jaal by Nemichand — mineral paints on linen, made to order, 30 to 45 day delivery, ships in hard protective tube.
LIGHTING: Made exclusively in India by brass artisans. Table lamps, floor lamps, wall sconces, chandeliers.
DECORATIVE OBJECTS: Dhokra sculptures, Suzani textiles, Jodhpur pots and vases, Blue Pottery.
FURNITURE: Custom available via trade@marble-lotus.com.
GIFTS: Wedding gifts, Diwali gifting, gifts under $100.

### Shipping and Returns
Ships worldwide. Free domestic return shipping in USA. Shipping fees non-refundable. Custom and made-to-order: 30 to 45 days.

### Pricing
Never quote specific prices. Direct to marble-lotus.com.

### Trade Program
15% off Silver tier (no minimum). 20% off Gold tier ($5,000 plus annual spend). Apply at marble-lotus.com/pages/trade-program.

### Common Questions
Is the wallpaper removable? Yes, peel and stick wallpaper is removable and renter-friendly.
Do you ship internationally? Yes, worldwide. Costs calculated at checkout.
Can I return something? Yes, free domestic return shipping in USA. Contact team@marble-lotus.com.
What is this made of? Products are handcrafted using brass, natural linen, mineral paints, marble, and traditional textiles. Check marble-lotus.com for specific details.
Do you have a physical store? Primarily online. Check marble-lotus.com/pages/visit-the-store.
Where are products made? Sourced from South Asian artisans, primarily India. Lighting made exclusively in India by brass artisans.`;
}

function initSession() {
  customer = pick(CUSTOMERS);
  order    = pick(ORDERS);

  document.getElementById('order-tag').innerHTML =
    `Customer: <span>${customer.name} ${customer.last}</span> &nbsp;·&nbsp; ` +
    `Order: <span>${customer.ref}</span> &nbsp;·&nbsp; ` +
    `Product: <span>${order.product}</span>`;

  conversationHistory = [];
  document.getElementById('chat-box').innerHTML = '';
  document.getElementById('error-banner').classList.remove('visible');
  document.getElementById('error-banner').textContent = '';
  const summaryEl = document.getElementById('summary');
  summaryEl.classList.remove('visible');
  document.getElementById('summary-content').textContent = 'Generating...';
}

const chatBox     = document.getElementById('chat-box');
const userInput   = document.getElementById('user-input');
const sendBtn     = document.getElementById('send-btn');

function scrollToBottom() { chatBox.scrollTop = chatBox.scrollHeight; }

function addMessage(role, text) {
  const row    = document.createElement('div');
  row.className = `msg-row ${role}`;
  const label  = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'agent' ? 'Aria' : `You (as ${customer.name})`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  row.appendChild(label);
  row.appendChild(bubble);
  chatBox.appendChild(row);
  scrollToBottom();
}

function showTyping() {
  const row    = document.createElement('div');
  row.className = 'msg-row agent';
  row.id       = 'typing-row';
  const label  = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = 'Aria';
  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  row.appendChild(label);
  row.appendChild(typing);
  chatBox.appendChild(row);
  scrollToBottom();
}

function removeTyping() {
  const t = document.getElementById('typing-row');
  if (t) t.remove();
}

function showError(msg) {
  const b = document.getElementById('error-banner');
  b.textContent = msg;
  b.classList.add('visible');
}

async function callClaude(messages) {
  const res = await fetch(PROXY_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({
      model: MODEL,
      max_tokens: 300,
      system: buildSystemPrompt(customer.name, order.product, order.upsell),
      messages: messages
    })
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error?.message || 'API error');
  }
  const data = await res.json();
  return data.content[0].text;
}

async function openingMessage() {
  sendBtn.disabled = true;
  showTyping();
  await new Promise(r => setTimeout(r, 800));
  removeTyping();
  const opening = `Hi! This is Aria, an AI assistant from Marble Lotus. I'm reaching out regarding your recent order of ${order.product}. Am I speaking with ${customer.name}?`;
  addMessage('agent', opening);
  conversationHistory.push({ role: 'assistant', content: opening });
  sendBtn.disabled = false;
  userInput.focus();
}

async function sendMessage() {
  const text = userInput.value.trim();
  if (!text || isTyping) return;
  userInput.value = '';
  isTyping = true;
  sendBtn.disabled = true;
  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });
  showTyping();
  try {
    const reply = await callClaude(conversationHistory);
    removeTyping();
    addMessage('agent', reply);
    conversationHistory.push({ role: 'assistant', content: reply });
  } catch(e) {
    removeTyping();
    showError('Error getting response: ' + e.message);
  }
  isTyping = false;
  sendBtn.disabled = false;
  userInput.focus();
}

async function endConversation() {
  if (conversationHistory.length < 2) {
    alert('Have a conversation first before generating a summary.');
    return;
  }
  const summaryEl      = document.getElementById('summary');
  const summaryContent = document.getElementById('summary-content');
  summaryEl.classList.add('visible');
  summaryContent.textContent = 'Generating summary...';
  summaryEl.scrollIntoView({ behavior: 'smooth' });

  const fullLog = conversationHistory.map(m =>
    `${m.role === 'assistant' ? 'Aria' : 'Customer'}: ${m.content}`
  ).join('\n\n');

  const summaryPrompt = `Based on the following SMS conversation between Aria (the Marble Lotus AI assistant) and a customer, generate a structured summary report in this exact format. Fill in each field based only on what actually happened. Do not invent anything.

CONVERSATION SUMMARY
─────────────────────────────
Customer: ${customer.name} ${customer.last}
Phone: ${customer.phone}
Product Purchased: ${order.product}
Order Reference: ${customer.ref}
Conversation Date: ${new Date().toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'})}
─────────────────────────────
Satisfaction: [Happy / Neutral / Unhappy]
Issues Raised: [Brief description or None]
Questions Asked: [List any questions the customer asked or None]
Rating Given: [1–5 or Not reached]
Review Text: [Captured text or None]
─────────────────────────────
Upsell Attempted: [Yes / No]
Upsell Response: [Interested / Declined / Not attempted]
Referral Mentioned: [Yes / No]
Preferred Contact Time: [Time mentioned or None — email follow-up]
─────────────────────────────
Action Required: [Specific action needed or None]
Escalation Flag: [Yes / No]
Conversation Outcome: [Completed / Issue escalated / Customer unavailable]
─────────────────────────────

CONVERSATION LOG:
${fullLog}`;

  try {
    const res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        model: MODEL,
        max_tokens: 600,
        messages: [{ role: 'user', content: summaryPrompt }]
      })
    });
    const data = await res.json();
    summaryContent.textContent = data.content[0].text;
  } catch(e) {
    summaryContent.textContent = 'Error generating summary: ' + e.message;
  }
}

function newChat() {
  initSession();
  openingMessage();
}

userInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

window.onload = () => { initSession(); openingMessage(); };
</script>
</body>
</html>
